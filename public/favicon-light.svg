<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="0.7">
      <stop offset="0%"   stop-color="#fbfaf6"/>
      <stop offset="100%" stop-color="#e8e2d6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2fb3b8" stop-opacity="0.85"/>
      <stop offset="30%"  stop-color="#007479" stop-opacity="0.42"/>
      <stop offset="60%"  stop-color="#007479" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#007479" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#cbf3f2"/>
      <stop offset="22%"  stop-color="#7fdcde"/>
      <stop offset="50%"  stop-color="#2fb3b8"/>
      <stop offset="78%"  stop-color="#0a7a7e"/>
      <stop offset="100%" stop-color="#003c40"/>
    </radialGradient>
    <radialGradient id="orbDepth" cx="78%" cy="84%" r="55%">
      <stop offset="0%"  stop-color="#000814" stop-opacity="0.38"/>
      <stop offset="65%" stop-color="#000814" stop-opacity="0"/>
    </radialGradient>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="frameClip">
      <rect width="64" height="64" rx="12"/>
    </clipPath>
    <clipPath id="orbClip">
      <circle cx="21.375" cy="42.625" r="10.625"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <g clip-path="url(#frameClip)">
    <circle cx="21.375" cy="42.625" r="27.5" fill="url(#glow)" filter="url(#softblur)"/>

    <g clip-path="url(#orbClip)">
      <circle cx="21.375" cy="42.625" r="10.625" fill="url(#orb)"/>
      <circle cx="21.375" cy="42.625" r="10.625" fill="url(#orbDepth)"/>
    </g>
    <circle cx="21.375" cy="42.625" r="10.625" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  </g>
</svg>
